services:
  redis:
    image: redis:7-alpine
    container_name: reddit-leads-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      target: web-runner
    container_name: reddit-leads-web
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      target: worker-runner
    container_name: reddit-leads-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      REDIS_URL: redis://redis:6379

volumes:
  redis-data:
